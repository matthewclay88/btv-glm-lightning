name: Update Lightning

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  lightning:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install goes2go geopandas shapely h5py h5netcdf

      - name: Run Script
        run: python lightning.py

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/lightning.json

          git diff --cached --quiet || (
            git commit -m "Update lightning.json"
            git push
          )
