name: Update Lightning
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
permissions:
  contents: write
jobs:
  lightning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Script
        run: python lightning.py
      - name: Commit Lightning Data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/last_run.txt
          git add data/
          git diff --cached --quiet || (
            git commit -m "Update lightning data"
            git push
          )
